<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Login | Alshifa Pathology Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Merriweather:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="brand">
        <span class="brand-mark">A</span>
        <span class="brand-text">Alshifa Pathology Lab</span>
      </a>
      <nav class="nav-links doctor-top-nav">
        <a href="index.html">Main Website</a>
      </nav>
    </div>
  </header>

  <main class="doctor-main">
    <section class="doctor-login-section">
      <div class="container">
        <div class="doctor-login-card">
          <p class="eyebrow">Customer Access</p>
          <h1>Login to View Report</h1>
          <p class="hero-copy">Use your booking ID and registered mobile number to access appointment status and report download.</p>

          <form id="customerLoginForm" class="booking-form" novalidate>
            <label>
              Booking ID
              <input type="text" name="bookingId" placeholder="Example: APT-123456" required />
            </label>
            <label>
              Mobile Number
              <input type="tel" name="phone" placeholder="10-digit mobile number" pattern="[0-9]{10}" required />
            </label>
            <button type="submit" class="btn btn-primary">Login</button>
            <p id="customerLoginMessage" class="booking-message" role="status" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="customer.js"></script>
</body>
</html>
